.servicios{

  padding: 50px;

  margin: 50px auto;
  text-align: center;

}

}

.tarjetas{
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.tarjeta{
  background: white;
  width: 250px;
  padding: 20px;
  border-radius: 20px;

}

}

  margin-top: 15px;
}

.volver{

  margin:40px 0;
}

.volver a{
  background:#f8c8dc;
  color:#6d6875;
  padding:15px 30px;
  text-decoration:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  border:2px solid #d6d6d6;
  transition:0.3s;
}

.volver a:hover{
  background:#ffe599;
}

nav a:hover{
