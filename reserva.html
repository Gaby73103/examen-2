<section class="reservar">

  <h2>Reserva tu Cita</h2>

  <p class="texto-reserva">
    Completa el formulario y agenda tu cita con nosotros.
  </p>

  <p>
    📧 Correo:
    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=barreramonroykimberlygabriela@gmail.com&su=Reserva%20de%20Cita" target="_blank">
      barreramonroykimberlygabriela@gmail.com
    </a>
  </p>

  <form onsubmit="enviarCorreo(); return false;">

    <input type="text" id="nombre" name="Nombre" placeholder="Nombre Completo" required>

    <input type="tel" id="telefono" name="Telefono" placeholder="Número de Teléfono" required>

    <input type="email" id="correo" name="Correo" placeholder="Correo Electrónico" required>

    <select id="servicio" name="Servicio" required>
      <option value="">Selecciona un servicio</option>
      <option>Corte de Cabello</option>
      <option>Maquillaje</option>
      <option>Manicura</option>
    </select>

    <input type="date" id="fecha" name="Fecha" required>

    <textarea id="mensaje" name="Mensaje" placeholder="Mensaje adicional"></textarea>

    <button type="submit">Reservar Cita</button>

  </form>

</section>

<script>

function enviarCorreo(){

  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let correo = document.getElementById("correo").value;
  let servicio = document.getElementById("servicio").value;
  let fecha = document.getElementById("fecha").value;
  let mensaje = document.getElementById("mensaje").value;

  let cuerpo = `
🌸 RESERVA DE CITA 🌸

👩 Nombre: ${nombre}

📞 Teléfono: ${telefono}

📧 Correo: ${correo}

💅 Servicio: ${servicio}

📅 Fecha: ${fecha}

📝 Mensaje: ${mensaje}
`;

  let url = `https://mail.google.com/mail/?view=cm&fs=1&to=barreramonroykimberlygabriela@gmail.com&su=Reserva%20de%20Cita&body=${encodeURIComponent(cuerpo)}`;

  window.open(url, "_blank");

  document.querySelector("form").reset();

}

</script>



<style>

/* FONDO GENERAL */

body{
  background:linear-gradient(to bottom,#fff5f7,#ffeef5);
  font-family: 'Poppins', sans-serif;
}

/* SECCIÓN RESERVAR */

.reservar{
  padding:80px 20px;
  text-align:center;
}

.reservar h2{
  color:#6d6875;
  font-size:48px;
  margin-bottom:15px;
  font-weight:bold;
}

.texto-reserva{
  color:#7a7a7a;
  font-size:20px;
  margin-bottom:50px;
}

/* FORMULARIO */

.formulario{
  max-width:650px;
  margin:auto;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);

  display:flex;
  flex-direction:column;
  gap:22px;
}

/* INPUTS */

.formulario input,
.formulario select,
.formulario textarea{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#fff;
  font-size:16px;
  color:#555;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
  transition:0.3s;
  outline:none;
}

/* EFECTO */

.formulario input:focus,
.formulario select:focus,
.formulario textarea:focus{
  transform:scale(1.02);
  box-shadow:0 0 10px rgba(248,200,220,0.8);
}

/* TEXTAREA */

.formulario textarea{
  resize:none;
  height:140px;
}

/* BOTÓN */

.formulario button{
  background:linear-gradient(135deg,#f8c8dc,#ffd6e7);
  color:#6d6875;
  border:none;
  padding:16px;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(248,200,220,0.5);
}

.formulario button:hover{
  transform:translateY(-3px);
  background:linear-gradient(135deg,#ffe599,#ffd6a5);
}

/* CORREO */

.reservar p a{
  color:#d16ba5;
  text-decoration:none;
  font-weight:bold;
}

.reservar p a:hover{
  text-decoration:underline;
}

/* BOTÓN VOLVER */

.volver{
  text-align:center;
  margin:50px 0;
}

.volver a{
  background:linear-gradient(135deg,#f8c8dc,#ffd6e7);
  color:#6d6875;
  padding:15px 35px;
  text-decoration:none;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(248,200,220,0.5);
  transition:0.3s;
}

.volver a:hover{
  background:linear-gradient(135deg,#ffe599,#ffd6a5);
  transform:translateY(-3px);
}


</style>

<!-- BOTÓN REGRESAR -->

<div class="volver">
  <a href="index.html">⬅ Regresar al Inicio</a>
</div>
